<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hell Jump Playtester Program</title>

    <style>
        :root {
            --primary: #aa63ff;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        html { box-sizing: border-box; }
        *, *::before, *::after { box-sizing: inherit; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        header {
            background: rgba(15, 23, 42, 0.94);
            color: white;
            padding: 0.75rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 12px 30px rgba(15,23,42,0.18);
            backdrop-filter: blur(14px);
        }

        .hero {
            min-height: 100vh;
            padding: 120px 5%;
            text-align: center;
            background: #aa63ff;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero h1 { font-size: 4rem; margin: 0; }
        .hero p { font-size: 1.3rem; max-width: 700px; margin: 1rem auto 0; }

        .container {
            padding: 50px 5%;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1rem;
        }

        input {
            padding: 10px;
            width: 80px;
            font-size: 1rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #e2e8f0;
        }
    </style>
</head>

<body>

<header>
    <div><strong>Playtester Program</strong></div>
</header>

<section class="hero">
    <h1>Playtester Program</h1>
    <p>Help test our games before release. Break it. Report it. Survive it.</p>
    <p>Playtest is not available for any game right now. Enjoy your day</p>
</section>

</body>
</html>
