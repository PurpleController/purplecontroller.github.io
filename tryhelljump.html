<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Hell Jump</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --primary: #ffda0b;
            --primary-dark: #e6c400;
            --dark: #1e293b;
            --darker: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--darker);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-link {
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: center;
        }
        .logo-link:hover { opacity: 0.9; }

        /* Hamburger menu */
        .hamburger-btn { display: none; background: none; border: none; color: white; cursor: pointer; width: 48px; height: 48px; padding: 8px; flex-direction: column; justify-content: center; align-items: center; gap: 6px; border-radius: 4px; transition: background-color 0.2s ease; }
        .hamburger-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .hamburger-btn:focus { outline: 2px solid rgba(255, 255, 255, 0.5); outline-offset: 2px; }
        .hamburger-btn span { display: block; width: 24px; height: 2px; background: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1px; }
        .hamburger-btn.active span:nth-child(1) { transform: rotate(45deg) translate(8px, 8px); }
        .hamburger-btn.active span:nth-child(2) { opacity: 0; transform: translateX(-8px); }
        .hamburger-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }
        #mobile-nav {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 20px;

            position: static;
            background: transparent;
            flex-direction: row;
            padding: 0;

            border-top: none;
        }
        #mobile-nav.active { display: flex; }
        #mobile-nav a { color: white; text-decoration: none; padding: 12px 5%; border-bottom: 1px solid rgba(255,255,255,0.1); display: block; }
        #mobile-nav .social-icons { display: flex; gap: 14px; padding: 12px 5%; border-bottom: none; }
        #mobile-nav .social-icons a { padding: 0; border-bottom: none; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.3); }
        .nav-close {
            display: none;
            align-self: flex-end;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 8px 5%;
            margin-right: 0;
        }

        nav { display: flex; align-items: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        nav a:hover { opacity: 0.8; }

        .social-icons { display: flex; align-items: center; gap: 14px; }
        .social-icons a { color: white; display: flex; align-items: center; opacity: 0.85; transition: opacity 0.2s; }
        .social-icons a:hover { opacity: 1; }
        .social-icons svg { width: 20px; height: 20px; fill: white; }
        .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.3); }

        .play-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 5%;
        }

        .play-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 960px;
        }

        .play-header img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,218,11,0.4));
        }

        .play-header h1 {
            font-size: 1.8rem;
            color: var(--primary);
            letter-spacing: 0.04em;
        }

        .play-header a {
            margin-left: auto;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .play-header a:hover { opacity: 1; }

        .game-frame-wrapper {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16/9;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #3d3d5c;
            background: #000;
            box-shadow: 0 0 40px rgba(255,218,11,0.08);
        }

        .game-frame-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .game-toolbar {
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .btn-fullscreen {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2d2d44;
            border: 1px solid #3d3d5c;
            color: var(--primary);
            padding: 7px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-fullscreen:hover {
            background: #3a3a55;
            transform: translateY(-1px);
        }

        .btn-fullscreen svg {
            width: 16px;
            height: 16px;
            fill: var(--primary);
        }

        .play-note {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #64748b;
            max-width: 960px;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: var(--dark);
            color: #64748b;
            margin-top: 32px;
        }
        footer a { color: var(--primary); text-decoration: none; }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            /* Header */
        header {
            background: rgba(15, 23, 42, 0.94);
            color: white;
            padding: 0.4rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;

            min-height: 64px;
            height: auto;
            box-sizing: border-box;
        }

            .hamburger-btn {
                display: flex;
                margin-left: auto;
                width: 56px;
                height: 56px;
                padding: 8px;
                flex-shrink: 0;
            }

            .nav-close {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin: 6px 4% 4px auto;
            }

        #mobile-nav {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;

            height: auto;
            max-height: 60vh;

            overflow-y: auto;

            flex-direction: column;
            background: rgba(15, 23, 42, 0.98);
            z-index: 999;

            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;

            transform: translateY(-8px);
            opacity: 0;
            pointer-events: none;

            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        #mobile-nav.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

            #mobile-nav a {
                border-radius: 0;
                display: flex;
                font-size: 0.95rem;
                justify-content: space-between;
                min-height: 56px;
                padding: 14px 4%;
                width: 100%;
                box-sizing: border-box;
                word-break: break-word;
                overflow-wrap: break-word;
            }

            #mobile-nav a:hover,
            #mobile-nav a:focus-visible,
            #mobile-nav a[aria-current="page"] {
                background: rgba(255,255,255,0.08);
            }

            #mobile-nav .social-icons {
                gap: 10px;
                padding: 14px 4% 0;
            }

            #mobile-nav .social-icons a {
                border-radius: 8px;
                min-height: 48px;
                padding: 0;
                width: 48px;
            }

            .nav-divider { display: none; }
            
            .hero {
                padding: 40px 4% 30px;
                width: 100%;
                box-sizing: border-box;
            }
            
            .hero h1 {
                font-size: 1.5rem;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            .hero p {
                font-size: 0.9rem;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            #mobile-nav a {
                font-size: 0.95rem;
                min-height: 48px;
                padding: 12px 5%;
                box-sizing: border-box;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            h2 { font-size: 1.4rem; }
            section { padding: 32px 4%; }
            .download-grid { grid-template-columns: 1fr; }
            .screenshots-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-link" aria-label="Go to main page">
                <img src="./images/AramCZGames.png" alt="AramCZGames logo" width="32" height="32" style="vertical-align:middle; margin-right:8px;">
                <strong>AramCZGames</strong>
            </a>
        </div>
        <button class="hamburger-btn" onclick="toggleMobileMenu()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="mobile-nav">
            <button class="nav-close" onclick="toggleMobileMenu()" aria-label="Close menu">×</button>
            <a href="hell-jump.html">Hell Jump</a>
            <div class="nav-divider"></div>
            <div class="social-icons">
                <a href="https://github.com/AramCZGames" target="_blank" rel="noopener" aria-label="GitHub">
                    <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                </a>
                <a href="https://x.com/AramCZGames" target="_blank" rel="noopener" aria-label="X (Twitter)">
                    <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>

                <a href="https://youtube.com/@AramCZGames" target="_blank" rel="noopener" aria-label="YouTube">

                </a>
            </div>
        </nav>
    </header>

    <div class="play-area">
        <div class="play-header">
            <img src="./images/HellJumpIcon.png" alt="Hell Jump icon">
            <h1>Hell Jump</h1>
            <a href="https://aramczgames.github.io/helljump">← Back to game page</a>
        </div>

        <div class="game-frame-wrapper">
            <iframe id="gameFrame" src="./Hell Jump (Beta)/Hell Jump (Beta).html" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="game-toolbar">
            <button class="btn-fullscreen" onclick="goFullscreen()">
                <svg viewBox="0 0 24 24"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
                Fullscreen
            </button>
        </div>

        <p class="play-note">⚠️ Use a modern browser (Brave or Firefox recommended). If the game doesn't load, try refreshing or enabling cross-origin isolation on your server.</p>
    </div>

    <script>
        function goFullscreen() {
            const frame = document.getElementById('gameFrame');
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
            else if (frame.mozRequestFullScreen) frame.mozRequestFullScreen();
        }
    </script>

    <footer>
        <p>&copy; 2026 <a href="index.html">AramCZGames</a>. Licenced under GNU 3.0 licence.</p>
    </footer>

    <script>
        function toggleMobileMenu() {
            const btn = document.querySelector('.hamburger-btn');
            const nav = document.getElementById('mobile-nav');
            btn.classList.toggle('active');
            nav.classList.toggle('active');
        }

        // Close mobile menu when a link is clicked
        document.querySelectorAll('#mobile-nav a').forEach(link => {
            link.addEventListener('click', toggleMobileMenu);
        });
    </script>

</body>
</html>
