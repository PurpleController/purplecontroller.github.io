<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --primary: #aa63ff;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background: var(--dark);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            opacity: 0.8;
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.3);
        }

        .social-icons {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .social-icons a {
            color: white;
            display: flex;
            align-items: center;
            opacity: 0.85;
            transition: opacity 0.2s;
        }

        .social-icons a:hover {
            opacity: 1;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .logo-link {
            text-decoration: none;
            color: white;
            display: inline-flex;
            align-items: center;
        }

        .logo-link strong {
            font-weight: 700;
        }

        .logo-link:hover {
            opacity: 0.9;
        }

        .hero {
            min-height: 100vh;
            padding: 120px 5%;
            text-align: center;
            background: #aa63ff;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.05em;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            margin: 1rem auto 0;
        }

        .container {
            padding: 50px 5%;
            max-width: 1200px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1.1fr));
            gap: 8px;
            margin-top: 30px;
            justify-items: center;
        }

        .card {
            text-align: center;
            min-width: 420px;
            width: 100%;
            max-width: 520px;
            background: white;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card h3 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card img.project-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: #e2e8f0;
            margin-top: 50px;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
            border: none;
            cursor: pointer;
            font: inherit;
            font-size: 1rem;
        }

        .form-status {
            margin-top: 12px;
            font-size: 0.95rem;
            display: none;
        }

        .form-status.success { color: #16a34a; }
        .form-status.error   { color: #dc2626; }
        /* ── MOBILE ── */
        @media (max-width: 640px) {
            /* Header */
        header {
            background: rgba(15, 23, 42, 0.94);
            color: white;
            padding: 0.4rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;

            min-height: 64px;
            height: auto;
            box-sizing: border-box;
        }

            .hamburger-btn {
                display: flex;
                margin-left: auto;
                width: 56px;
                height: 56px;
                padding: 8px;
                flex-shrink: 0;
            }

            .nav-close {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin: 6px 4% 4px auto;
            }

        #mobile-nav {
            display: none;
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;

            height: auto;
            max-height: 60vh;

            overflow-y: auto;

            flex-direction: column;
            background: rgba(15, 23, 42, 0.98);
            z-index: 999;

            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;

            transform: translateY(-8px);
            opacity: 0;
            pointer-events: none;

            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        #mobile-nav.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

            #mobile-nav a {
                border-radius: 0;
                display: flex;
                font-size: 0.95rem;
                justify-content: space-between;
                min-height: 56px;
                padding: 14px 4%;
                width: 100%;
                box-sizing: border-box;
                word-break: break-word;
                overflow-wrap: break-word;
            }

            #mobile-nav a:hover,
            #mobile-nav a:focus-visible,
            #mobile-nav a[aria-current="page"] {
                background: rgba(255,255,255,0.08);
            }

            #mobile-nav .social-icons {
                gap: 10px;
                padding: 14px 4% 0;
            }

            #mobile-nav .social-icons a {
                border-radius: 8px;
                min-height: 48px;
                padding: 0;
                width: 48px;
            }

            .nav-divider { display: none; }
            
            .hero {
                padding: 40px 4% 30px;
                width: 100%;
                box-sizing: border-box;
            }
            
            .hero h1 {
                font-size: 1.5rem;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            .hero p {
                font-size: 0.9rem;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            #mobile-nav a {
                font-size: 0.95rem;
                min-height: 48px;
                padding: 12px 5%;
                box-sizing: border-box;
                word-break: break-word;
                overflow-wrap: break-word;
            }
            
            h2 { font-size: 1.4rem; }
            section { padding: 32px 4%; }
            .download-grid { grid-template-columns: 1fr; }
            .screenshots-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
